<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Best Shows | Free Membership</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" data-root="">
    <div class="nav-container">
      <a href="index.html" class="brand">Best Shows</a>
      <ul class="nav-menu">
        <li><a href="index.html#reviews">Reviews</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">
      <h1>Create your account</h1>
      <p class="subtitle">Free forever. Rate shows, track history, see community scores.</p>

      <div class="auth-form">
        <div class="form-error" id="reg-error"></div>
        <div class="form-group">
          <label for="username">Display Name</label>
          <input type="text" id="username" name="username" required placeholder="How you'll appear on ratings" autocomplete="nickname">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password <span style="color:var(--text-muted); font-weight:400;">(min 6 characters)</span></label>
          <input type="password" id="password" name="password" required placeholder="Choose a password" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label style="display:flex; gap:0.5rem; align-items:flex-start; cursor:pointer;">
            <input type="checkbox" id="agree" style="margin-top:3px; width:auto; flex-shrink:0;">
            <span style="color:var(--text-muted); font-size:0.9rem;">I agree to the <a href="terms.html" style="color:var(--accent);">Terms of Use</a> and <a href="privacy.html" style="color:var(--accent);">Privacy Policy</a>.</span>
          </label>
        </div>
        <button class="btn-submit" id="reg-btn">Create Account</button>
        <div class="auth-switch">
          Already a member? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'members.html';

    document.getElementById('reg-btn').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const agree = document.getElementById('agree').checked;
      const errEl = document.getElementById('reg-error');
      errEl.style.display = 'none';

      if (!agree) {
        errEl.textContent = 'You must agree to the Terms and Privacy Policy.';
        errEl.style.display = 'block';
        return;
      }

      const result = Auth.register(username, email, password);
      if (result.ok) {
        window.location.href = 'members.html';
      } else {
        errEl.textContent = result.error;
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
