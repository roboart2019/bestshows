<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Best Shows</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" data-root="">
    <div class="nav-container">
      <a href="index.html" class="brand">Best Shows</a>
      <ul class="nav-menu">
        <li><a href="index.html#reviews">Reviews</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to rate shows and track your history.</p>

      <div class="auth-form">
        <div class="form-error" id="login-error"></div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Your password" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="login-btn">Log In</button>
        <div class="auth-switch">
          Don't have an account? <a href="register.html">Join free</a>
        </div>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'members.html';

    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';

      const result = Auth.login(email, password);
      if (result.ok) {
        window.location.href = 'members.html';
      } else {
        errEl.textContent = result.error;
        errEl.style.display = 'block';
      }
    });

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
